<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naan Mudhalvan Login</title>
    <!-- Links to the login.css inside the same folder -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Main Background Wrapper -->
    <div class="login-wrapper">
        <div class="overlay"></div>

        <!-- Centered Login Box -->
        <div class="login-card">
            
            <!-- Logo Section using the nested img folder -->
            <div class="logo-container">
                <img src="img/logo-plantgreen.png" alt="Plant Green Logo" class="brand-logo">
                <img src="img/tnsdc.png" alt="Tamil Nadu Skill Development Corporation Logo" class="brand-logo">
            </div>

            <h2>Tamil Nadu Skill Development Corporation</h2>

            <!-- Form -->
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder="Enter Full Name" required>
                </div>
                
                <div class="input-group">
                    <input type="email" id="email" placeholder="Enter Email Address" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="Enter Password" required>
                </div>

                <button type="submit" class="btn-submit">Start Learning</button>
            </form>

        </div>
    </div>

    <!-- Links to the login.js inside the same folder -->
    <script src="login.js"></script>
</body>
</html>
